site_name: Handsets
site_url: https://elliotgao2.github.io/handsets/
site_description: A millisecond-latency CLI for driving Android devices. Built for LLM agents and shell scripts.
repo_url: https://github.com/elliotgao2/handsets
repo_name: elliotgao2/handsets
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - blog:
      blog_dir: blog
      post_url_format: "{slug}"
      archive: false
      categories: true
      pagination_per_page: 10

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Benchmark: benchmark.md
  - Cookbook: cookbook.md
  - Sharp edges: sharp-edges.md
  - Wire reference: wire.md
  - Blog:
      - blog/index.md
