<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Phone-bezel inspired rounded rectangle. Single ink colour. -->
  <rect x="20" y="20" width="200" height="200" rx="36"
        fill="#101010"/>

  <!-- Lowercase 'hs' monogram, refined serif, white on ink. -->
  <text x="120" y="160"
        text-anchor="middle"
        font-family="'Hoefler Text', 'Big Caslon', Garamond, Georgia, 'Times New Roman', serif"
        font-size="128"
        font-weight="300"
        letter-spacing="-2"
        fill="#fafafa">hs</text>

  <!-- Subtle hairline echoing the wordmark logo's underline. -->
  <line x1="62" y1="184" x2="178" y2="184"
        stroke="#fafafa" stroke-width="1.4" stroke-linecap="square"/>
</svg>
